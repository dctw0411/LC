<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Le Cercle — 解鎖獨家禮遇</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Didact+Gothic&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #1a1610;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.8rem 3.5rem;
  }

  .container {
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 420px;
  }

  /* LOGO */
  .logo-wrap {
    margin-bottom: 2.2rem;
    opacity: 0;
    animation: fadein 1s 0.2s ease forwards;
  }
  .logo-wrap img {
    width: 180px; height: auto; display: block; margin: 0 auto;
    filter: brightness(1.15);
  }

  /* Headline */
  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(34px, 9vw, 46px);
    color: #ffffff;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 0.6rem;
    letter-spacing: 0.02em;
    opacity: 0;
    animation: fadein 1s 0.4s ease forwards;
  }

  .sub {
    font-family: 'Didact Gothic', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: #c9a96e;
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadein 1s 0.6s ease forwards;
  }

  /* Tasks */
  .tasks {
    display: flex; flex-direction: column; gap: 14px;
    width: 100%; margin-bottom: 2.2rem;
    opacity: 0;
    animation: fadein 1s 0.8s ease forwards;
  }

  .task-btn {
    display: flex; align-items: center; gap: 18px;
    padding: 20px 22px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,169,110,0.35);
    border-radius: 6px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.3s, border-color 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .task-btn:active { transform: scale(0.98); }
  .task-btn.done {
    background: rgba(201,169,110,0.12);
    border-color: rgba(201,169,110,0.7);
  }

  .task-icon {
    width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .task-text { flex: 1; }
  .task-title {
    font-family: 'Didact Gothic', sans-serif;
    font-size: 15px; letter-spacing: 0.1em;
    color: #ffffff; text-transform: uppercase; margin-bottom: 4px;
  }
  .task-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; color: #a89070; font-style: italic;
  }

  .check {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.35);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.4s;
  }
  .check-inner { display: none; }
  .task-btn.done .check {
    background: #c9a96e; border-color: #c9a96e;
  }
  .task-btn.done .check-inner { display: block; }

  /* Divider */
  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(to right, transparent, rgba(201,169,110,0.25), transparent);
    margin-bottom: 2.2rem;
    opacity: 0;
    animation: fadein 1s 1s ease forwards;
  }

  /* CTA */
  .cta-area {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    width: 100%;
    opacity: 0;
    animation: fadein 1s 1.1s ease forwards;
  }

  .unlock-msg {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px; font-style: italic;
    text-align: center; line-height: 1.6;
    color: #6a5c48;
    transition: color 0.5s;
  }
  .unlock-msg.unlocked { color: #c9a96e; }

  .cta-btn {
    width: 100%;
    padding: 18px 40px;
    background: transparent;
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 4px;
    font-family: 'Didact Gothic', sans-serif;
    font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase;
    color: #4a3e2e; cursor: not-allowed;
    transition: all 0.4s;
  }
  .cta-btn.active {
    color: #c9a96e; border-color: #c9a96e; cursor: pointer;
    animation: pulse 2.5s ease-in-out infinite;
  }
  .cta-btn.confirmed {
    color: #c9a96e; border-color: #c9a96e;
    background: rgba(201,169,110,0.1);
    animation: none; cursor: default;
  }

  .staff-note {
    font-family: 'Didact Gothic', sans-serif;
    font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
    color: #5a4e3e; text-align: center;
  }

  #flash {
    position: fixed; inset: 0;
    background: rgba(201,169,110,0.08);
    pointer-events: none; opacity: 0;
    transition: opacity 0.6s; z-index: 99;
  }
  #flash.show { opacity: 1; }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,169,110,0); }
    50% { box-shadow: 0 0 20px 4px rgba(201,169,110,0.18); }
  }
</style>
</head>

<script>
  const done = {t1: false, t2: false};
  let confirmed = false;
  function markDone(id) {
    setTimeout(function() {
      if (done[id]) return;
      done[id] = true;
      document.getElementById(id).classList.add('done');
      if (done.t1 && done.t2) {
        var btn = document.getElementById('cta');
        var msg = document.getElementById('msg');
        btn.classList.add('active');
        btn.disabled = false;
        msg.classList.add('unlocked');
        msg.innerHTML = '任務完成 ✦<br>向服務人員出示此畫面';
      }
    }, 600);
  }
  function handleCta() {
    if (confirmed) return;
    confirmed = true;
    var btn = document.getElementById('cta');
    var note = document.getElementById('snote');
    var flash = document.getElementById('flash');
    btn.classList.remove('active');
    btn.classList.add('confirmed');
    btn.textContent = '已出示確認 ✓';
    note.style.opacity = '1';
    flash.classList.add('show');
    setTimeout(function() { flash.classList.remove('show'); }, 1000);
  }
</script>
