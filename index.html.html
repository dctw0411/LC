<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Cercle — 解鎖續酒禮遇</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Didact+Gothic&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #0d0b08;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.5rem 3rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Grain texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    opacity: 0.4; pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 400px;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(28px, 8vw, 40px);
    color: #f5ede0;
    text-align: center;
    line-height: 1.25;
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadein 1s 0.4s ease forwards;
  }

  .sub {
    font-family: 'Didact Gothic', sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: #6a5c48;
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 2.8rem;
    opacity: 0;
    animation: fadein 1s 0.6s ease forwards;
  }

  /* Tasks */
  .tasks {
    display: flex; flex-direction: column; gap: 12px;
    width: 100%; margin-bottom: 2rem;
    opacity: 0;
    animation: fadein 1s 0.8s ease forwards;
  }

  .task-btn {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 20px;
    background: rgba(201,169,110,0.05);
    border: 0.5px solid rgba(201,169,110,0.2);
    border-radius: 3px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.3s, border-color 0.3s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .task-btn:active { transform: scale(0.98); }
  .task-btn:hover {
    background: rgba(201,169,110,0.1);
    border-color: rgba(201,169,110,0.4);
  }
  .task-btn.done {
    background: rgba(201,169,110,0.1);
    border-color: rgba(201,169,110,0.5);
  }

  .task-icon {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .task-text { flex: 1; }
  .task-title {
    font-family: 'Didact Gothic', sans-serif;
    font-size: 12px; letter-spacing: 0.15em;
    color: #f5ede0; text-transform: uppercase; margin-bottom: 3px;
  }
  .task-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; color: #6a5c48; font-style: italic;
  }

  .check {
    width: 26px; height: 26px; border-radius: 50%;
    border: 0.5px solid rgba(201,169,110,0.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.4s;
  }
  .check-inner { display: none; }
  .task-btn.done .check {
    background: #c9a96e; border-color: #c9a96e;
  }
  .task-btn.done .check-inner { display: block; }

  /* Divider */
  .divider {
    width: 100%; height: 0.5px;
    background: linear-gradient(to right, transparent, rgba(201,169,110,0.15), transparent);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadein 1s 1s ease forwards;
  }

  /* CTA */
  .cta-area {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    opacity: 0;
    animation: fadein 1s 1.1s ease forwards;
  }

  .unlock-msg {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; font-style: italic;
    text-align: center; line-height: 1.5;
    transition: color 0.5s; color: #3d3020;
  }
  .unlock-msg.unlocked { color: #c9a96e; }

  .cta-btn {
    padding: 15px 40px;
    background: transparent;
    border: 0.5px solid rgba(201,169,110,0.2);
    border-radius: 2px;
    font-family: 'Didact Gothic', sans-serif;
    font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase;
    color: #3d3020; cursor: not-allowed;
    transition: all 0.4s;
    -webkit-tap-highlight-color: transparent;
  }
  .cta-btn.active {
    color: #c9a96e; border-color: rgba(201,169,110,0.7); cursor: pointer;
    animation: pulse 2.5s ease-in-out infinite;
  }
  .cta-btn.active:active { transform: scale(0.97); }
  .cta-btn.confirmed {
    color: #c9a96e; border-color: #c9a96e;
    background: rgba(201,169,110,0.08);
    animation: none; cursor: default;
  }

  .staff-note {
    font-family: 'Didact Gothic', sans-serif;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: #4a3e2e; text-align: center;
  }

  /* Flash overlay */
  #flash {
    position: fixed; inset: 0;
    background: rgba(201,169,110,0.07);
    pointer-events: none; opacity: 0;
    transition: opacity 0.6s; z-index: 99;
  }
  #flash.show { opacity: 1; }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,169,110,0); }
    50% { box-shadow: 0 0 16px 3px rgba(201,169,110,0.15); }
  }
</style>
</head>
<body>
<div id="flash"></div>
<div class="container">
  <div class="gold-line"></div>
  <div class="logo">Le Cercle 尊爵俱樂部</div>
  <div class="headline">完成任務<br>解鎖獨家禮遇</div>
  <div class="sub">Complete Both Tasks · Unlock Privileges</div>

  <div class="tasks">
    <!-- LINE OA -->
    <a href="https://iline.tw/cvq3L" target="_blank" class="task-btn" id="t1" onclick="markDone('t1')">
      <div class="task-icon">
        <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
          <rect width="42" height="42" rx="21" fill="#06C755" fill-opacity="0.15"/>
          <rect x="10" y="10" width="22" height="22" rx="4" fill="#06C755"/>
          <path d="M21 13c-4.8 0-8.5 3.2-8.5 7.2 0 2.6 1.6 4.9 4 6.2l-.5 3.4 4.1-2.2c.3.1.6.1.9.1 4.8 0 8.5-3.2 8.5-7.2S25.8 13 21 13z" fill="white"/>
        </svg>
      </div>
      <div class="task-text">
        <div class="task-title">加入 LINE OA</div>
        <div class="task-desc">訂閱獨家會員通知</div>
      </div>
      <div class="check" id="c1">
        <svg class="check-inner" width="13" height="10" viewBox="0 0 13 10" fill="none">
          <path d="M1.5 5L5 8.5L11.5 1.5" stroke="#0d0b08" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

    <!-- IG -->
    <a href="https://www.instagram.com/le_cercle_taiwan/" target="_blank" class="task-btn" id="t2" onclick="markDone('t2')">
      <div class="task-icon">
        <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
          <rect width="42" height="42" rx="21" fill="url(#igbg)" fill-opacity="0.15"/>
          <defs>
            <linearGradient id="igbg" x1="0" y1="42" x2="42" y2="0">
              <stop offset="0%" stop-color="#f09433"/>
              <stop offset="50%" stop-color="#dc2743"/>
              <stop offset="100%" stop-color="#bc1888"/>
            </linearGradient>
            <linearGradient id="ig" x1="10" y1="32" x2="32" y2="10" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#f09433"/>
              <stop offset="50%" stop-color="#dc2743"/>
              <stop offset="100%" stop-color="#bc1888"/>
            </linearGradient>
          </defs>
          <rect x="10" y="10" width="22" height="22" rx="5" fill="url(#ig)"/>
          <circle cx="21" cy="21" r="5" stroke="white" stroke-width="1.5" fill="none"/>
          <circle cx="27" cy="15" r="1.5" fill="white"/>
        </svg>
      </div>
      <div class="task-text">
        <div class="task-title">追蹤 Instagram</div>
        <div class="task-desc">探索頂級烈酒世界</div>
      </div>
      <div class="check" id="c2">
        <svg class="check-inner" width="13" height="10" viewBox="0 0 13 10" fill="none">
          <path d="M1.5 5L5 8.5L11.5 1.5" stroke="#0d0b08" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>
  </div>

  <div class="divider"></div>

  <div class="cta-area">
    <div class="unlock-msg" id="msg">完成以上兩項後<br>向服務人員出示此畫面</div>
    <button class="cta-btn" id="cta" disabled onclick="handleCta()">出示給服務人員</button>
    <div class="staff-note" id="snote" style="opacity:0; transition: opacity 0.5s;">請向服務人員出示此畫面</div>
  </div>
</div>

<script>
  const done = { t1: false, t2: false };
  let confirmed = false;

  function markDone(id) {
    setTimeout(function() {
      if (done[id]) return;
      done[id] = true;
      document.getElementById(id).classList.add('done');
      checkAll();
    }, 600);
  }

  function checkAll() {
    if (!done.t1 || !done.t2) return;
    var btn = document.getElementById('cta');
    var msg = document.getElementById('msg');
    btn.classList.add('active');
    btn.disabled = false;
    msg.classList.add('unlocked');
    msg.innerHTML = '任務完成 ✦<br>向服務人員出示此畫面';
  }

  function handleCta() {
    if (confirmed) return;
    confirmed = true;
    var btn = document.getElementById('cta');
    var note = document.getElementById('snote');
    var flash = document.getElementById('flash');
    btn.classList.remove('active');
    btn.classList.add('confirmed');
    btn.textContent = '已出示確認';
    note.style.opacity = '1';
    flash.classList.add('show');
    setTimeout(function() { flash.classList.remove('show'); }, 1000);
  }
</script>
</body>
</html>
